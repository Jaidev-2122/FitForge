{% extends "layout.html" %}
{% block body %}
<div class="ob-wrap">
  <div class="ob-card">

    <!-- Step A: name -->
    <div id="welcome-step">
      <div style="text-align:center; margin-bottom:28px;">
        <div style="font-size:34px; font-weight:700; color:var(--accent-1); letter-spacing:-1px;">FitForge</div>
        <div style="font-size:13px; color:var(--text2); margin-top:4px;">Your AI fitness companion that evolves with you</div>
      </div>
      <div class="ob-q" style="text-align:center;">What should I call you?</div>
      <input class="input" id="name-input" placeholder="Your name" style="margin-bottom:16px; text-align:center;" autofocus>
      <button class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;" onclick="startQuiz()">Let's go →</button>
    </div>

    <!-- Step B: quiz -->
    <div id="quiz" style="display:none;">
      <div class="ob-progress" id="progress"></div>
      <div class="ob-tier" id="tier"></div>
      <div class="ob-q" id="question"></div>
      <div id="answer-area"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
        <button class="btn btn-ghost btn-sm" id="back-btn" onclick="prev()">← Back</button>
        <button class="btn btn-primary" id="next-btn" onclick="next()">Next →</button>
      </div>
    </div>

    <!-- Step C: building -->
    <div id="builder" style="display:none; text-align:center;">
      <div style="width:28px; height:28px; border:3px solid var(--border2); border-top-color:var(--accent-1); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px;"></div>
      <div id="build-msg" style="color:var(--text1); font-size:14px;">Building your plan...</div>
    </div>

  </div>
</div>

<script>
const QUESTIONS = [
  // ---- Tier 1: the basics ----
  {key:"age", q:"How old are you?", type:"number", tier:1},
  {key:"biological_sex", q:"Biological sex? (affects training & recovery response)", type:"choice", single:true, options:["male","female","other"], tier:1},
  {key:"height_cm", q:"Your height in cm?", type:"number", tier:1},
  {key:"weight_kg", q:"Current weight in kg?", type:"number", tier:1},
  {key:"country", q:"Which country are you in? (for cheap local food ideas)", type:"text", tier:1},
  {key:"body_type", q:"How would you describe your current build?", type:"choice", options:["Lean / slim","Average","Carrying extra weight","Larger / heavier","Already muscular"], tier:1},

  // ---- Tier 2: capacity & goals (this is where the AI calibrates YOU) ----
  {key:"history", q:"Your training history?", type:"choice", options:["Total beginner","Trained a bit before","Trained seriously, took a break","Currently training"], tier:2},
  {key:"experience_lifts", q:"Comfort with barbell lifts (squat, deadlift, press)?", type:"choice", options:["Never done them","Tried, shaky on form","Comfortable","Very experienced"], tier:2},
  {key:"pushup_max", q:"Right now, how many full push-ups could you do in one go? (knees-down counts as 0-5)", type:"choice", options:["0-5","6-15","16-30","30+"], tier:2},
  {key:"pullup_ability", q:"Can you do a pull-up?", type:"choice", options:["Not yet","1-3 reps","4-10 reps","10+ reps"], tier:2},
  {key:"plank_hold", q:"How long can you hold a solid plank?", type:"choice", options:["Under 20s","20-45s","45-90s","90s+"], tier:2},
  {key:"squat_depth", q:"Can you sit into a full deep squat (heels down) comfortably?", type:"choice", options:["No — heels lift / I fall back","Only partway","Yes but it's tight","Yes, easily"], tier:2},
  {key:"toe_touch", q:"Standing with straight legs, how far can you reach?", type:"choice", options:["Can't reach past knees","Mid-shin","Touch my toes","Palms flat on floor"], tier:2},
  {key:"posture_issues", q:"Any of these sound like you? (pick the biggest one)", type:"choice", options:["Rounded shoulders / hunching","Forward head from screens","Lower back arches or aches","Stiff hips from sitting","None really"], tier:2},
  {key:"flexibility_goal", q:"How much do you care about flexibility & mobility vs pure strength?", type:"choice", options:["Strength only — minimal stretching","Mostly strength, some mobility","50/50 — I want both","Flexibility is a top goal"], tier:2},
  {key:"goal", q:"The main outcome you want?", type:"choice", options:["Lose fat / get leaner","Build muscle / get bigger","Get stronger","Fix posture & move better","Improve endurance / fitness"], tier:2},
  {key:"goal_why", q:"What's the REAL reason behind that goal? (event, confidence, health, energy — be honest, I use this to keep you going)", type:"text", tier:2, optional:true},
  {key:"target_areas", q:"Any areas you most want to develop?", type:"choice", options:["Whole body evenly","Chest & arms","Back & shoulders","Glutes & legs","Core / midsection"], tier:2},
  {key:"preferred_style", q:"What kind of training actually appeals to you?", type:"choice", options:["Lifting weights","Bodyweight / calisthenics","Circuits / HIIT","Mix of everything","Not sure yet"], tier:2},

  // ---- Tier 3: schedule, recovery, life ----
  {key:"days_per_week", q:"Realistically — not ideally — days per week you'll train?", type:"choice", options:["2","3","4","5","6"], tier:3},
  {key:"session_length", q:"How long can a session actually be?", type:"choice", options:["20-30 min","30-45 min","45-60 min","60-90 min"], tier:3},
  {key:"train_time", q:"When will you usually train?", type:"choice", options:["Early morning","Midday","Evening","Late night","Varies"], tier:3},
  {key:"equipment", q:"What do you have access to?", type:"choice", options:["Full gym","Home with dumbbells/bands","Bodyweight only","Mix of home + gym"], tier:3},
  {key:"injuries", q:"Any injuries, pain points, or movements to avoid? (knees, back, shoulders…)", type:"text", tier:3, optional:true},
  {key:"sitting_hours", q:"Hours per day you spend sitting (desk, commute, gaming)?", type:"choice", options:["Under 4","4-7","8-10","10+"], tier:3},
  {key:"sleep", q:"Hours of sleep on a typical night?", type:"number", tier:3},
  {key:"recovery_speed", q:"After a hard workout, how sore are you 2 days later?", type:"choice", options:["Barely sore","A bit, fades fast","Quite sore","Wrecked for days"], tier:3},
  {key:"diet_restrictions", q:"Any dietary restrictions? (vegetarian, vegan, halal, allergies… blank if none)", type:"text", tier:3, optional:true},
  {key:"motivation_style", q:"What keeps you going best?", type:"choice", options:["Tough love — push me hard","Encouragement & positivity","Data & progress numbers","Streaks & gamification"], tier:3},
  {key:"biggest_obstacle", q:"Last one — what's the single biggest thing that usually stops you sticking to a routine? Be honest.", type:"text", tier:3, optional:true},
];

const TIER_LABELS = {1:"The basics", 2:"Your training", 3:"Body & lifestyle"};

let step = 0;
const answers = {};

function startQuiz() {
  const name = document.getElementById("name-input").value.trim();
  if (!name) { document.getElementById("name-input").focus(); return; }
  answers.name = name;
  document.getElementById("welcome-step").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  render();
}

function render() {
  const q = QUESTIONS[step];
  document.getElementById("progress").innerHTML = QUESTIONS.map((_, i) => `<div class="${i <= step ? 'on' : ''}"></div>`).join("");
  document.getElementById("tier").textContent = TIER_LABELS[q.tier] || "About you";
  document.getElementById("question").textContent = q.q;
  document.getElementById("back-btn").style.visibility = step === 0 ? "hidden" : "visible";
  const area = document.getElementById("answer-area");
  const nextBtn = document.getElementById("next-btn");
  const isLast = step === QUESTIONS.length - 1;
  nextBtn.textContent = isLast ? "Build my plan" : "Next →";

  if (q.type === "choice") {
    const multi = !q.single;  // every choice question is multi-select unless flagged single
    // selected is always stored as an array internally for choice questions
    const sel = Array.isArray(answers[q.key]) ? answers[q.key]
              : (answers[q.key] ? [answers[q.key]] : []);
    answers[q.key] = sel;

    let html = "";
    if (multi) html += `<div class="ob-hint">Pick all that apply — choose one or more.</div>`;
    html += `<div class="ob-options">` + q.options.map(o => {
      const on = sel.includes(o);
      return `<button class="ob-opt ${on ? 'sel' : ''}" onclick="toggle('${o.replace(/'/g,"\\'")}')">
                ${multi ? `<span class="ob-check">${on ? '✓' : ''}</span>` : ''}${o}
              </button>`;
    }).join("") + `</div>`;
    area.innerHTML = html;

    if (multi) {
      // multi-select needs an explicit confirm; single auto-advances on tap
      nextBtn.style.display = "inline-flex";
    } else {
      nextBtn.style.display = "none";
    }
  } else {
    nextBtn.style.display = "inline-flex";
    area.innerHTML = `<input class="input" id="ob-input" type="${q.type==='number'?'number':'text'}" placeholder="Type your answer..." value="${answers[q.key]||''}" style="margin-bottom:20px;">`
      + (q.optional ? `<button class="btn btn-ghost btn-sm" onclick="skip()" style="margin-bottom:12px;">Skip</button>` : "");
    const inp = document.getElementById("ob-input");
    inp.focus();
    inp.addEventListener("keydown", e => { if (e.key === "Enter") next(); });
  }
}

// single-select: set + advance. multi-select: toggle in array, stay put.
function toggle(val) {
  const q = QUESTIONS[step];
  if (q.single) { answers[q.key] = val; advance(); return; }
  const arr = Array.isArray(answers[q.key]) ? answers[q.key] : [];
  const i = arr.indexOf(val);
  if (i >= 0) arr.splice(i, 1); else arr.push(val);
  answers[q.key] = arr;
  render();  // re-render to update checkmarks
}
function skip() { answers[QUESTIONS[step].key] = ""; advance(); }
function next() {
  const q = QUESTIONS[step];
  if (q.type === "choice") {
    // require at least one selection on multi-select choice questions
    const sel = answers[q.key];
    if ((!Array.isArray(sel) || sel.length === 0) && !q.optional) return;
  } else {
    const v = document.getElementById("ob-input").value;
    if (!v && !q.optional) return;
    answers[q.key] = v;
  }
  advance();
}
function advance() {
  if (step === QUESTIONS.length - 1) { build(); return; }
  step++; render();
}
function prev() { if (step > 0) { step--; render(); } }

async function build() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("builder").style.display = "block";
  const msgEl = document.getElementById("build-msg");

  msgEl.textContent = "Saving your profile...";
  try {
    // Step 1: build routine (one Gemini call)
    const res = await fetch("{{ url_for('onboarding_complete') }}", {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(answers)
    });
    const data = await res.json();
    if (!data.ok) {
      msgEl.textContent = "Error: " + (data.error || "failed") + ". Is your Gemini key set?";
      return;
    }

    // Step 2: nutrition brief (second Gemini call, separate request to keep memory low)
    msgEl.textContent = "Building your nutrition plan...";
    try {
      await fetch("{{ url_for('onboarding_diet') }}", {
        method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(answers)
      });
    } catch(_) { /* diet brief is non-critical — carry on */ }

    msgEl.textContent = "All done! Taking you to your dashboard...";
    setTimeout(() => { location.href = "{{ url_for('dashboard') }}"; }, 800);

  } catch (e) {
    msgEl.textContent = "Network error: " + e.message;
  }
}
</script>
{% endblock %}
