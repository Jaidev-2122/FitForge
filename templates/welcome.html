{% extends "layout.html" %}
{% block body %}
<div class="ob-wrap">
  <div class="ob-card">

    <!-- Step A: name -->
    <div id="welcome-step">
      <div style="text-align:center; margin-bottom:28px;">
        <div style="font-size:34px; font-weight:700; color:var(--accent-1); letter-spacing:-1px;">FitForge</div>
        <div style="font-size:13px; color:var(--text2); margin-top:4px;">Your AI fitness companion that evolves with you</div>
      </div>
      <div class="ob-q" style="text-align:center;">What should I call you?</div>
      <input class="input" id="name-input" placeholder="Your name" style="margin-bottom:16px; text-align:center;" autofocus>
      <button class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;" onclick="startQuiz()">Let's go →</button>
    </div>

    <!-- Step B: quiz -->
    <div id="quiz" style="display:none;">
      <div class="ob-progress" id="progress"></div>
      <div class="ob-tier" id="tier"></div>
      <div class="ob-q" id="question"></div>
      <div id="answer-area"></div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
        <button class="btn btn-ghost btn-sm" id="back-btn" onclick="prev()">← Back</button>
        <button class="btn btn-primary" id="next-btn" onclick="next()">Next →</button>
      </div>
    </div>

    <!-- Step C: building -->
    <div id="builder" style="display:none; text-align:center;">
      <div style="width:28px; height:28px; border:3px solid var(--border2); border-top-color:var(--accent-1); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px;"></div>
      <div id="build-msg" style="color:var(--text1); font-size:14px;">Building your plan...</div>
    </div>

  </div>
</div>

<script>
const QUESTIONS = [
  // ---- Tier 1: the basics ----
  {key:"age", q:"How old are you?", type:"number", tier:1},
  {key:"biological_sex", q:"Biological sex? (it affects how you respond to training and recovery)", type:"choice", options:["male","female","other"], tier:1},
  {key:"height_cm", q:"Your height in cm?", type:"number", tier:1},
  {key:"weight_kg", q:"Current weight in kg?", type:"number", tier:1},
  {key:"target_weight_kg", q:"Is there a weight you're aiming for? (cm/kg — leave blank if unsure)", type:"text", tier:1, optional:true},
  {key:"country", q:"Which country are you in? (so food suggestions are local and cheap)", type:"text", tier:1},
  {key:"body_type", q:"How would you describe your current build?", type:"choice", options:["Lean / slim","Average","Carrying some extra weight","Larger / heavier","Muscular already"], tier:1},

  // ---- Tier 2: training background ----
  {key:"history", q:"What's your training history?", type:"choice", options:["Total beginner","Trained a bit before","Trained seriously, took a break","Currently training"], tier:2},
  {key:"why_stopped", q:"If you've stopped training before, what actually got in the way? (be honest — boredom, time, injury, motivation?)", type:"text", tier:2, optional:true},
  {key:"experience_lifts", q:"How comfortable are you with weights like squats, deadlifts and presses?", type:"choice", options:["Never done them","Done them, unsure on form","Comfortable","Very experienced"], tier:2},
  {key:"goal", q:"What's the main outcome you want?", type:"choice", options:["Lose fat / get leaner","Build muscle / get bigger","Get stronger","Tone up & stay healthy","Improve endurance / fitness"], tier:2},
  {key:"goal_why", q:"What's the real reason behind that goal? (an event, confidence, health, energy — this helps me keep you motivated)", type:"text", tier:2, optional:true},
  {key:"target_areas", q:"Any body areas you most want to focus on?", type:"choice", options:["Whole body evenly","Upper body","Lower body / glutes & legs","Core / midsection","Posture & back"], tier:2},
  {key:"days_per_week", q:"Realistically — not ideally — how many days a week will you train?", type:"choice", options:["2","3","4","5","6"], tier:2},
  {key:"session_length", q:"How long can a typical session actually be?", type:"choice", options:["20-30 min","30-45 min","45-60 min","60-90 min"], tier:2},
  {key:"equipment", q:"What do you have access to?", type:"choice", options:["Full gym","Home with dumbbells/bands","Bodyweight only","Mix of home + gym"], tier:2},
  {key:"preferred_style", q:"What kind of training appeals to you most?", type:"choice", options:["Lifting weights","Bodyweight / calisthenics","Circuits / HIIT","A mix of everything","Not sure yet"], tier:2},
  {key:"enjoyed_before", q:"Any exercise or activity you've genuinely enjoyed before? (sport, dance, running, anything)", type:"text", tier:2, optional:true},
  {key:"disliked", q:"Anything you really dislike or want to avoid in workouts?", type:"text", tier:2, optional:true},

  // ---- Tier 3: body, recovery, lifestyle ----
  {key:"injuries", q:"Any injuries, pain points, or movements you should avoid? (knees, back, shoulders…)", type:"text", tier:3, optional:true},
  {key:"medical", q:"Any health conditions I should train around? (heart, blood pressure, asthma — leave blank if none)", type:"text", tier:3, optional:true},
  {key:"activity_level", q:"Outside workouts, how active is your day?", type:"choice", options:["Mostly sitting","Lightly active","On my feet a lot","Physically demanding job"], tier:3},
  {key:"energy", q:"How are your energy levels through a normal day?", type:"choice", options:["Low / often tired","Up and down","Generally good","High"], tier:3},
  {key:"sleep", q:"How many hours do you usually sleep?", type:"number", tier:3},
  {key:"stress", q:"How would you rate your daily stress?", type:"choice", options:["Low","Moderate","High","Very high"], tier:3},
  {key:"diet_now", q:"How would you honestly describe how you eat right now?", type:"choice", options:["Pretty clean","Average / mixed","Lots of takeaway & snacks","All over the place"], tier:3},
  {key:"diet_restrictions", q:"Any dietary restrictions or preferences? (vegetarian, vegan, halal, allergies…)", type:"text", tier:3, optional:true},
  {key:"water_now", q:"Roughly how much water do you drink daily?", type:"choice", options:["Barely any","A few glasses","Around 1-2 litres","2 litres or more"], tier:3},
  {key:"motivation_style", q:"What keeps you going best?", type:"choice", options:["Tough love / push me hard","Encouragement & positivity","Data & progress numbers","Streaks & gamification"], tier:3},
  {key:"biggest_obstacle", q:"Last one — what's the single biggest thing that usually stops you sticking to a routine?", type:"text", tier:3, optional:true},
];

const TIER_LABELS = {1:"The basics", 2:"Your training", 3:"Body & lifestyle"};

let step = 0;
const answers = {};

function startQuiz() {
  const name = document.getElementById("name-input").value.trim();
  if (!name) { document.getElementById("name-input").focus(); return; }
  answers.name = name;
  document.getElementById("welcome-step").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  render();
}

function render() {
  const q = QUESTIONS[step];
  document.getElementById("progress").innerHTML = QUESTIONS.map((_, i) => `<div class="${i <= step ? 'on' : ''}"></div>`).join("");
  document.getElementById("tier").textContent = TIER_LABELS[q.tier] || "About you";
  document.getElementById("question").textContent = q.q;
  document.getElementById("back-btn").style.visibility = step === 0 ? "hidden" : "visible";
  const area = document.getElementById("answer-area");
  const nextBtn = document.getElementById("next-btn");
  const isLast = step === QUESTIONS.length - 1;
  nextBtn.textContent = isLast ? "Build my plan" : "Next →";

  if (q.type === "choice") {
    nextBtn.style.display = "none";
    area.innerHTML = `<div class="ob-options">` + q.options.map(o =>
      `<button class="ob-opt ${answers[q.key]===o?'sel':''}" onclick="choose('${o.replace(/'/g,"\\'")}')">${o}</button>`).join("") + `</div>`;
  } else {
    nextBtn.style.display = "inline-flex";
    area.innerHTML = `<input class="input" id="ob-input" type="${q.type==='number'?'number':'text'}" placeholder="Type your answer..." value="${answers[q.key]||''}" style="margin-bottom:20px;">`
      + (q.optional ? `<button class="btn btn-ghost btn-sm" onclick="skip()" style="margin-bottom:12px;">Skip</button>` : "");
    const inp = document.getElementById("ob-input");
    inp.focus();
    inp.addEventListener("keydown", e => { if (e.key === "Enter") next(); });
  }
}

function choose(val) { answers[QUESTIONS[step].key] = val; advance(); }
function skip() { answers[QUESTIONS[step].key] = ""; advance(); }
function next() {
  const q = QUESTIONS[step];
  if (q.type !== "choice") {
    const v = document.getElementById("ob-input").value;
    if (!v && !q.optional) return;
    answers[q.key] = v;
  }
  advance();
}
function advance() {
  if (step === QUESTIONS.length - 1) { build(); return; }
  step++; render();
}
function prev() { if (step > 0) { step--; render(); } }

async function build() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("builder").style.display = "block";
  const msgs = ["Saving your profile...", "AI is building your pilot-week routine...", "Generating your nutrition plan..."];
  let mi = 0;
  const msgEl = document.getElementById("build-msg");
  const iv = setInterval(() => { mi = (mi + 1) % msgs.length; msgEl.textContent = msgs[mi]; }, 2500);
  try {
    const res = await fetch("{{ url_for('onboarding_complete') }}", {
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(answers)
    });
    const data = await res.json();
    clearInterval(iv);
    if (data.ok) { location.href = "{{ url_for('dashboard') }}"; }
    else { msgEl.textContent = "Error: " + (data.error || "failed") + ". Is your Gemini key set?"; }
  } catch (e) {
    clearInterval(iv);
    msgEl.textContent = "Network error: " + e.message;
  }
}
</script>
{% endblock %}
